<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Reactive Chat Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .chat-card { width: 90vw; max-width: 900px; height: 80vh; background: #1e293b; border-radius: 16px; display: flex; overflow: hidden; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); border: 1px solid #334155; }
        .sidebar { width: 30%; background: #0f172a; padding: 20px; display: flex; flex-direction: column; gap: 20px; border-right: 1px solid #334155; }
        .main-chat { width: 70%; display: flex; flex-direction: column; background: #1e293b; }
        .chat-header { padding: 20px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        .message-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .input-area { padding: 20px; background: #1e293b; border-top: 1px solid #334155; display: flex; flex-direction: column; gap: 8px; }
        .input-row { display: flex; gap: 10px; }
        input { background: #334155; border: 1px solid #475569; padding: 12px; border-radius: 8px; color: white; font-size: 14px; outline: none; width: 100%; }
        input:focus { border-color: #38bdf8; }
        button { background: #0284c7; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0369a1; }
        .msg-bubble { padding: 10px 14px; border-radius: 12px; max-width: 75%; width: fit-content; line-height: 1.4; }
        .msg-incoming { background: #334155; align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg-outgoing { background: #0284c7; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg-system { background: transparent; color: #94a3b8; font-size: 13px; align-self: center; font-style: italic; border-radius: 0; padding: 4px; }
        .meta-text { font-size: 11px; color: #94a3b8; margin-bottom: 4px; display: block; }
        .typing-box { font-size: 13px; color: #38bdf8; font-style: italic; min-height: 20px; padding-left: 5px; }
        .badge { background: #10b981; padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .counter-badge { background: #64748b; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="chat-card">
    <div class="sidebar">
        <h3>Setup Engine</h3>
        <div style="display: flex; flex-direction: column; gap: 8px;">
            <label style="font-size: 12px; color: #94a3b8;">Handle Name</label>
            <input type="text" id="username" value="Gourav">
        </div>
        <div style="display: flex; flex-direction: column; gap: 8px;">
            <label style="font-size: 12px; color: #94a3b8;">Target Room Node</label>
            <input type="text" id="roomId" value="101">
        </div>
        <button onclick="connectEngine()">Establish Connection</button>
        <div id="statusIndicator" style="font-size: 13px; color: #ef4444; margin-top: 10px;">🔴 Offline</div>
    </div>

    <div class="main-chat">
        <div class="chat-header">
            <h2 id="roomTitle">Room Pipeline: Active</h2>
            <div style="display: flex; gap: 10px; align-items: center;">
                <span class="counter-badge" id="memberCounter">Members: 0</span>
                <span class="badge">WebFlux Platform</span>
            </div>
        </div>

        <div class="message-area" id="messageArea"></div>

        <div class="input-area">
            <div class="typing-box" id="typingBox"></div>
            <div class="input-row">
                <input type="text" id="userInputMessage" placeholder="Send secure reactive packet..." oninput="sendTypingSignal()" disabled>
                <button id="sendPacketBtn" onclick="dispatchMessage()" disabled>Send</button>
            </div>
        </div>
    </div>
</div>

<script>
    let socket;
    let typingTimeout;
    let localActiveCount = 1; // Default starting with the user itself

    function connectEngine() {
        const roomId = document.getElementById('roomId').value;
        const currentUser = document.getElementById('username').value;

        // DYNAMIC PROTOCOL DETECTOR: Ye line auto-check karegi ki aap localhost pr ho ya render par
        const isLocal = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.hostname === "";
        const wsUrl = isLocal
            ? "ws://localhost:8080/chat"
            : `wss://${window.location.host}/chat`;

        console.log("Connecting to core pipeline via: " + wsUrl);
        socket = new WebSocket(wsUrl);

        socket.onopen = () => {
            document.getElementById('statusIndicator').innerText = "🟢 Connected to Node " + roomId;
            document.getElementById('statusIndicator').style.color = "#10b981";
            document.getElementById('roomTitle').innerText = "Room Pipeline: " + roomId;
            document.getElementById('userInputMessage').disabled = false;
            document.getElementById('sendPacketBtn').disabled = false;
            updateCounterDisplay();

            // Simple validation connection message
            sendSignal("SYSTEM", `${currentUser} connected to pipeline room.`);
        };

        socket.onmessage = (event) => {
            console.log("Raw packet payload received:", event.data);
            const messageArea = document.getElementById('messageArea');
            let parsedData;

            // SAFE PARSING: Agar backend flat text bhej raha ho ya JSON object, dono handle honge
            try {
                parsedData = JSON.parse(event.data);
            } catch (e) {
                // Fallback architecture if backend echoes plain text string
                parsedData = {
                    type: "CHAT",
                    sender: "System Node",
                    content: event.data
                };
            }

            if (parsedData.type === "TYPING") {
                if (parsedData.sender !== currentUser) {
                    document.getElementById('typingBox').innerText = `${parsedData.sender} is typing...`;
                    clearTimeout(typingTimeout);
                    typingTimeout = setTimeout(() => {
                        document.getElementById('typingBox').innerText = "";
                    }, 1500);
                }
            }
            else if (parsedData.type === "SYSTEM") {
                messageArea.innerHTML += `<div class="msg-bubble msg-system">➔ ${parsedData.content}</div>`;
                messageArea.scrollTop = messageArea.scrollHeight;
            }
            else {
                // Default Chat execution routing
                const isSelf = parsedData.sender === currentUser;
                const msgHtml = `
                    <div class="msg-bubble ${isSelf ? 'msg-outgoing' : 'msg-incoming'}">
                        <span class="meta-text"><b>${parsedData.sender || 'Anonymous'}</b></span>
                        <div>${parsedData.content}</div>
                    </div>`;
                messageArea.innerHTML += msgHtml;
                messageArea.scrollTop = messageArea.scrollHeight;
            }
        };

        socket.onerror = (error) => {
            console.error("Pipeline Sync Error:", error);
            document.getElementById('statusIndicator').innerText = "🔴 Connection Error";
            document.getElementById('statusIndicator').style.color = "#ef4444";
        };

        socket.onclose = () => {
            document.getElementById('statusIndicator').innerText = "🔴 Disconnected";
            document.getElementById('statusIndicator').style.color = "#ef4444";
        };
    }

    function updateCounterDisplay() {
        document.getElementById('memberCounter').innerText = `Members: ${localActiveCount}`;
    }

    function sendSignal(type, content) {
        const payload = {
            type: type,
            sender: document.getElementById('username').value,
            roomId: document.getElementById('roomId').value,
            content: content,
            timestamp: Date.now()
        };

        if (socket && socket.readyState === WebSocket.OPEN) {
            // Direct object conversion stream structure matching WebFlux mappings
            socket.send(JSON.stringify(payload));
        }
    }

    function dispatchMessage() {
        const input = document.getElementById('userInputMessage');
        if (!input.value.trim()) return;

        sendSignal("CHAT", input.value);
        input.value = '';
    }

    function sendTypingSignal() {
        sendSignal("TYPING", "");
    }
</script>
</body>
</html>
