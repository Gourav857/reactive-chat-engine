# 1. Server Ingress Configuration (Cloud Platform Friendly)
# Live servers dynamic port allocate karte hain, isiliye ${PORT:8080} likhna zaroori hai
server.port=${PORT:8080}

# 2. Reactive Netty Server Optimization
spring.main.web-application-type=reactive

# 3. Distributed Reactive Redis Layer Setup (Switching from Local to Cloud)
# Jab local pe chalao toh isko active rehn do, par jab live cloud db connect karenge toh URL ka use karenge
# spring.data.redis.host=localhost
# spring.data.redis.port=6379

# Cloud Redis ki direct complete connection string string (Upstash ya RedisLabs ka live url aayega yahan)
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}
spring.data.redis.timeout=60000

# 4. JSON Processing Configuration
spring.jackson.deserialization.fail-on-unknown-properties=false